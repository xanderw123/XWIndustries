<!DOCTYPE html>
<html>
<head>
    <title>XW Industries</title>
    <meta name="description" content="XW Industries">
    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico">
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        
        .logo {
            margin: 40px 0;
        }
        
        .logo img {
            max-width: 500px;
            width: 100%;
            height: auto;
            animation: flicker 4s infinite;
        }
        
        @keyframes flicker {
            0%, 97%, 100% { opacity: 1; }
            98% { opacity: 0.85; }
            99% { opacity: 1; }
        }
        
        .notice {
            margin: 60px auto 80px;
            max-width: 480px;
            color: #999999;
            font-size: 12px;
            line-height: 1.7;
            letter-spacing: 0.02em;
        }
        
        .notice p {
            margin: 0.8em 0;
        }
        
        .footer {
            margin-top: 80px;
            padding-top: 20px;
            border-top: 1px solid #333333;
            font-size: 11px;
            color: #999999;
        }
        
        .counter {
            font-family: "Courier New", Courier, monospace;
            background-color: #000000;
            color: #00CC00;
            padding: 2px 8px;
            font-size: 11px;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid #003300;
        }
        
        .best-viewed {
            font-size: 10px;
            color: #666666;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    
    <div class="container">
        
        <div class="logo">
            <img src="./images/XW_computer.png" alt="XW Industries">
        </div>
        
        <div class="notice">
            <p>The XW Industries Web site is being updated.</p>
            <p>Please return shortly.</p>
        </div>
        
        <div class="footer">
            Copyright &copy; 1997 XW Industries. All Rights Reserved.<br>
            Last updated: January 15, 1997<br><br>
            <span class="counter">Visitors: 999,999,999</span>
            <div class="best-viewed">
                Best viewed in Netscape Navigator 3.0 at 800x600 resolution.
            </div>
        </div>
        
    </div>
    
</body>
</html>
